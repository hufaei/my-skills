name: Publish notes to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "notes/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static notes site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/content
          mkdir -p _site/assets
          cp docs/index.html _site/index.html
          cp -R docs/assets/. _site/assets/
          touch _site/.nojekyll
          for note in notes/*/README.md; do
            slug="$(basename "$(dirname "$note")")"
            cp "$note" "_site/content/${slug}.md"
            mkdir -p "_site/notes/${slug}"
            cp docs/index.html "_site/notes/${slug}/index.html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
