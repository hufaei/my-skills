<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Claude Sonnet 5 / Claude Code 2.1.207 学习图谱</title>
  <desc id="desc">从通用助手底座到上下文续作的六层 Claude Code 学习地图</desc>
  <defs>
    <style>
      text { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #25211f; }
      .title { font-size: 46px; font-weight: 800; letter-spacing: -1px; }
      .subtitle { font-size: 23px; fill: #675f59; }
      .module-title { font-size: 22px; font-weight: 780; }
      .module-copy { font-size: 22px; fill: #544f4b; }
      .number { font-size: 24px; font-weight: 800; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .flow-label { font-size: 22px; font-weight: 750; text-anchor: middle; }
      .principle { font-size: 22px; font-weight: 760; }
      .check { font-size: 22px; fill: #5a5551; }
      .hook { font-size: 27px; font-weight: 780; fill: #4b2d22; text-anchor: middle; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#25211f" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9b7768"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fbfaf7"/>
  <circle cx="1460" cy="76" r="105" fill="#f3e7df" opacity="0.72"/>
  <circle cx="105" cy="820" r="120" fill="#eaf2ee" opacity="0.72"/>

  <text x="800" y="72" class="title" text-anchor="middle">Claude Sonnet 5 / Claude Code 2.1.207 学习图谱</text>
  <text x="800" y="112" class="subtitle" text-anchor="middle">助手底座 + 工作区证据 + Bundled Skills + Compact 上下文连续性</text>

  <g filter="url(#shadow)">
    <rect x="40" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#d7aa8e" stroke-width="2"/>
    <rect x="296" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#94bca9" stroke-width="2"/>
    <rect x="552" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#a7a7d9" stroke-width="2"/>
    <rect x="808" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#d8b56e" stroke-width="2"/>
    <rect x="1064" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#9ab8d2" stroke-width="2"/>
    <rect x="1320" y="148" width="240" height="218" rx="18" fill="#ffffff" stroke="#c29bc3" stroke-width="2"/>
  </g>

  <g>
    <circle cx="70" cy="180" r="20" fill="#b56c48"/><text x="70" y="180" class="number">1</text>
    <text x="100" y="188" class="module-title">Sonnet 助手底座</text>
    <text x="64" y="233" class="module-copy"><tspan x="64">当前事实先搜索</tspan><tspan x="64" dy="34">只读工具主动取证</tspan><tspan x="64" dy="34">Memory 选择性使用</tspan><tspan x="64" dy="34">安全与版权上层</tspan></text>

    <circle cx="326" cy="180" r="20" fill="#4d8c70"/><text x="326" y="180" class="number">2</text>
    <text x="356" y="188" class="module-title">Workspace</text>
    <text x="320" y="233" class="module-copy"><tspan x="320">仓库文件定行为</tspan><tspan x="320" dy="34">Git 定本地状态</tspan><tspan x="320" dy="34">测试 / 日志定故障</tspan><tspan x="320" dy="34">先读、保守编辑</tspan></text>

    <circle cx="582" cy="180" r="20" fill="#6b6bb0"/><text x="582" y="180" class="number">3</text>
    <text x="612" y="188" class="module-title">Bundled Skills</text>
    <text x="576" y="233" class="module-copy"><tspan x="576">Use when 触发</tspan><tspan x="576" dy="34">按阶段执行</tspan><tspan x="576" dy="34">确认 Gate 分风险</tspan><tspan x="576" dy="34">Definition of done</tspan></text>

    <circle cx="838" cy="180" r="20" fill="#b08028"/><text x="838" y="180" class="number">4</text>
    <text x="868" y="188" class="module-title">Config / Doctor</text>
    <text x="832" y="233" class="module-copy"><tspan x="832">Scope 与覆盖顺序</tspan><tspan x="832" dy="34">Hooks / Permissions</tspan><tspan x="832" dy="34">先证据后建议</tspan><tspan x="832" dy="34">权限扩大单独确认</tspan></text>

    <circle cx="1094" cy="180" r="20" fill="#4e7fa6"/><text x="1094" y="180" class="number">5</text>
    <text x="1124" y="188" class="module-title">Review / Artifacts</text>
    <text x="1088" y="233" class="module-copy"><tspan x="1088">Effort 控制召回率</tspan><tspan x="1088" dy="34">候选需失败场景</tspan><tspan x="1088" dy="34">Dataviz 先看关系</tspan><tspan x="1088" dy="34">Artifact 必须渲染</tspan></text>

    <circle cx="1350" cy="180" r="20" fill="#925994"/><text x="1350" y="180" class="number">6</text>
    <text x="1380" y="188" class="module-title">Compact 2.1.207</text>
    <text x="1344" y="233" class="module-copy"><tspan x="1344">Full / Rewind</tspan><tspan x="1344" dy="34">Continuation 续作</tspan><tspan x="1344" dy="34">保存错误与待办</tspan><tspan x="1344" dy="34">消息归属防伪</tspan></text>
  </g>

  <rect x="40" y="398" width="1520" height="146" rx="22" fill="#ffffff" stroke="#d9cec8" stroke-width="2"/>
  <text x="76" y="430" class="principle" fill="#7b5140">一次工程任务的主执行链</text>
  <g>
    <rect x="63" y="454" width="205" height="62" rx="14" fill="#f8eee8" stroke="#d7aa8e"/>
    <text x="165" y="486" class="flow-label">用户任务</text>
    <line x1="271" y1="485" x2="302" y2="485" stroke="#9b7768" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="310" y="454" width="205" height="62" rx="14" fill="#edf6f1" stroke="#94bca9"/>
    <text x="412" y="486" class="flow-label">工作区证据</text>
    <line x1="518" y1="485" x2="549" y2="485" stroke="#9b7768" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="557" y="454" width="205" height="62" rx="14" fill="#f2f1fa" stroke="#a7a7d9"/>
    <text x="659" y="486" class="flow-label">Skill / Effort</text>
    <line x1="765" y1="485" x2="796" y2="485" stroke="#9b7768" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="804" y="454" width="205" height="62" rx="14" fill="#fff7e8" stroke="#d8b56e"/>
    <text x="906" y="486" class="flow-label">保守执行</text>
    <line x1="1012" y1="485" x2="1043" y2="485" stroke="#9b7768" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="1051" y="454" width="205" height="62" rx="14" fill="#eef5fa" stroke="#9ab8d2"/>
    <text x="1153" y="486" class="flow-label">上下文续作</text>
    <line x1="1259" y1="485" x2="1290" y2="485" stroke="#9b7768" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="1298" y="454" width="205" height="62" rx="14" fill="#f8eff8" stroke="#c29bc3"/>
    <text x="1400" y="486" class="flow-label">验证交付</text>
  </g>

  <g>
    <rect x="40" y="578" width="240" height="154" rx="16" fill="#fcf7f4" stroke="#e6caba"/>
    <text x="62" y="615" class="principle">助手先核验“现在”</text>
    <text x="62" y="655" class="check"><tspan x="62">版本 / 状态 / 当前角色</tspan><tspan x="62" dy="32">搜索而不是凭记忆</tspan></text>

    <rect x="296" y="578" width="240" height="154" rx="16" fill="#f4faf7" stroke="#c6ded3"/>
    <text x="318" y="615" class="principle">Workspace 定真相</text>
    <text x="318" y="655" class="check"><tspan x="318">文件、Git、测试、日志</tspan><tspan x="318" dy="32">分别证明不同状态</tspan></text>

    <rect x="552" y="578" width="240" height="154" rx="16" fill="#f7f6fc" stroke="#d3d2ec"/>
    <text x="574" y="615" class="principle">Skill 定义闭环</text>
    <text x="574" y="655" class="check"><tspan x="574">触发、顺序、Gate</tspan><tspan x="574" dy="32">完成标准缺一不可</tspan></text>

    <rect x="808" y="578" width="240" height="154" rx="16" fill="#fffbf3" stroke="#e9d3a6"/>
    <text x="830" y="615" class="principle">Scope 先于值</text>
    <text x="830" y="655" class="check"><tspan x="830">配置先看覆盖关系</tspan><tspan x="830" dy="32">权限变化独立决策</tspan></text>

    <rect x="1064" y="578" width="240" height="154" rx="16" fill="#f5f9fc" stroke="#c9d9e7"/>
    <text x="1086" y="615" class="principle">视觉也要验证</text>
    <text x="1086" y="655" class="check"><tspan x="1086">数据关系决定图形</tspan><tspan x="1086" dy="32">实际渲染决定完成</tspan></text>

    <rect x="1320" y="578" width="240" height="154" rx="16" fill="#fbf5fb" stroke="#dfc8df"/>
    <text x="1342" y="615" class="principle">摘要保存 Provenance</text>
    <text x="1342" y="655" class="check"><tspan x="1342">真实用户消息才授权</tspan><tspan x="1342" dy="32">示例对话不能冒充</tspan></text>
  </g>

  <rect x="98" y="778" width="1404" height="78" rx="26" fill="#f7eee8" stroke="#d7aa8e" stroke-width="2"/>
  <text x="800" y="825" class="hook">Sonnet 定助手底座，Claude Code 用 Skills 扩展执行，Compact 保证长任务不断线。</text>
</svg>
