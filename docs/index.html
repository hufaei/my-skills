<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Prompt Atlas</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #62605b;
      --line: #d9d7cf;
      --accent: #0969da;
      --accent-soft: #e8f0fe;
      --accent-ink: #174ea6;
      --warm-soft: #f5efe1;
      --warm-ink: #7a5520;
      --code: #f1f3f4;
      --table: #fbfbf8;
      --shadow: 0 8px 24px rgba(32, 33, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.65 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: var(--accent);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 251, 248, 0.96);
      backdrop-filter: blur(10px);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px clamp(16px, 4vw, 32px);
    }

    .brand {
      color: var(--ink);
      font-weight: 750;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav-actions a {
      text-decoration: none;
    }

    .nav-actions a:hover {
      text-decoration: underline;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: clamp(22px, 4vw, 46px) clamp(16px, 4vw, 32px) 64px;
    }

    .home-hero {
      margin-bottom: 32px;
    }

    .home-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      border: 1px solid #ccd8ee;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .home-hero h1 {
      margin: 0 0 10px;
      max-width: 860px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    .home-hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 18px;
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      max-width: 1000px;
    }

    .note-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 214px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--ink);
      padding: 22px;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(32, 33, 36, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .note-card:hover,
    .note-card:focus-visible {
      border-color: #b6c7e6;
      box-shadow: var(--shadow);
      outline: none;
      transform: translateY(-1px);
    }

    .note-card h2 {
      margin: 0;
      max-width: 18ch;
      font-size: clamp(21px, 2.4vw, 27px);
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    .note-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .card-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 24px;
    }

    .family-tag,
    .status-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.35;
      letter-spacing: 0.04em;
    }

    .family-tag {
      background: var(--code);
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-badge {
      border: 1px solid #ccd8ee;
      background: var(--accent-soft);
      color: var(--accent-ink);
    }

    .note-card[data-latest="true"] .status-badge {
      border-color: #e7d5b8;
      background: var(--warm-soft);
      color: var(--warm-ink);
    }

    .card-copy {
      display: grid;
      gap: 9px;
    }

    .card-snapshot {
      margin-top: auto;
      border-top: 1px solid #eceae4;
      padding-top: 11px;
      color: #77746e;
      font-size: 12px;
    }

    .note-page {
      display: grid;
      gap: 22px;
    }

    .note-page > * {
      min-width: 0;
    }

    .note-title {
      display: grid;
      gap: 8px;
    }

    .note-title h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      letter-spacing: 0;
      line-height: 1.12;
    }

    .note-title p {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
    }

    .snapshot-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      color: #77746e;
      font-size: 13px;
    }

    .snapshot-line .dot {
      color: #aaa69d;
    }

    .mindmap {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .mindmap img {
      display: block;
      width: 100%;
      height: auto;
      background: var(--code);
    }

    .mindmap figcaption {
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 48px);
    }

    .article h1,
    .article h2,
    .article h3,
    .article h4 {
      line-height: 1.25;
      margin: 1.6em 0 0.7em;
    }

    .article h1 {
      margin-top: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0;
    }

    .article h2 {
      border-top: 1px solid var(--line);
      padding-top: 24px;
      font-size: 24px;
    }

    .article h3 {
      font-size: 20px;
    }

    .article h4 {
      font-size: 17px;
    }

    .article p,
    .article ul,
    .article ol,
    .article pre,
    .article table,
    .article blockquote {
      margin: 0 0 16px;
    }

    .article ul,
    .article ol {
      padding-left: 26px;
    }

    .article li + li {
      margin-top: 5px;
    }

    .article code {
      border-radius: 5px;
      background: var(--code);
      padding: 0.12em 0.35em;
      font: 0.92em/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .article pre {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #202124;
      color: #f8f9fa;
      padding: 16px;
    }

    .article pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: 13px;
    }

    .article table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      border-radius: 8px;
    }

    .article th,
    .article td {
      border: 1px solid var(--line);
      padding: 9px 11px;
      vertical-align: top;
    }

    .article th {
      background: var(--table);
      text-align: left;
    }

    .article blockquote {
      border-left: 4px solid #b6c7e6;
      color: var(--muted);
      padding-left: 14px;
    }

    .article hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 28px 0;
    }

    .empty {
      color: var(--muted);
      padding: 24px;
    }

    @media (prefers-reduced-motion: reduce) {
      .note-card {
        transition: none;
      }
    }

    @media (max-width: 720px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .note-card {
        min-height: 0;
      }

      .note-grid {
        grid-template-columns: 1fr;
      }

      .home-hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" id="homeLink" href="./">AI Prompt Atlas</a>
      <div class="nav-actions">
        <span id="currentLabel">全部笔记</span>
      </div>
    </nav>
  </header>

  <main class="shell" id="app">
    <div class="empty">正在加载。</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const notes = [
      {
        slug: "gpt-5.6-codex-runtime",
        title: "GPT-5.6 / Codex Runtime",
        heading: "GPT-5.6 / Codex Runtime",
        family: "OpenAI · Codex",
        badge: "最新快照",
        latest: true,
        snapshot: "源快照 · 2026-07-12",
        meta: "模型行为、Runtime 能力、skills、工具路由与验证交付",
        file: "content/gpt-5.6-codex-runtime.md",
        image: "assets/mindmaps/gpt-5.6-codex-runtime.png"
      },
      {
        slug: "claude-sonnet-5-claude-code-2.1.207",
        title: "Claude Sonnet 5 / Claude Code 2.1.207",
        heading: "Claude Sonnet 5 / Claude Code 2.1.207",
        family: "Anthropic · Claude",
        badge: "最新快照",
        latest: true,
        snapshot: "源快照 · 2026-07-12",
        meta: "助手底座、技能系统、配置诊断、评审与上下文续作",
        file: "content/claude-sonnet-5-claude-code-2.1.207.md",
        image: "assets/mindmaps/claude-sonnet-5-claude-code-2.1.207.png"
      },
      {
        slug: "gpt-5.5-prompt-framework",
        title: "GPT-5.5 Prompt Framework",
        heading: "GPT-5.5 提示词框架",
        family: "OpenAI",
        badge: "通用框架",
        latest: false,
        snapshot: "已按 2026-07-12 源快照复核",
        meta: "source-of-truth 路由、边界、工具契约",
        file: "content/gpt-5.5-prompt-framework.md",
        image: "assets/mindmaps/gpt-5.5-prompt-framework.png"
      },
      {
        slug: "claude-fable-5-claude-code-prompt-framework",
        title: "Claude Fable 5 / Claude Code",
        heading: "Claude Fable 5 / Claude Code",
        family: "Anthropic",
        badge: "工程基线",
        latest: false,
        snapshot: "已按 2026-07-12 源快照复核",
        meta: "工作区证据、工程执行、验证、Git 边界",
        file: "content/claude-fable-5-claude-code-prompt-framework.md",
        image: "assets/mindmaps/claude-fable-5-claude-code-prompt-framework.png"
      },
      {
        slug: "grok-prompt-evolution",
        title: "Grok Prompt Evolution",
        heading: "Grok 提示词演进",
        family: "xAI",
        badge: "演进笔记",
        latest: false,
        snapshot: "已按 2026-07-12 源快照复核",
        meta: "X/web、工具注册、render、多 agent、sandbox",
        file: "content/grok-prompt-evolution.md",
        image: "assets/mindmaps/grok-prompt-evolution.png"
      },
      {
        slug: "gemini-prompt-family",
        title: "Gemini Prompt Family",
        heading: "Gemini 提示词家族",
        family: "Google",
        badge: "家族笔记",
        latest: false,
        snapshot: "已按 2026-07-12 源快照复核",
        meta: "Pro gate、Flash Web UI、Nano Banana API",
        file: "content/gemini-prompt-family.md",
        image: "assets/mindmaps/gemini-prompt-family.png"
      }
    ];

    const app = document.getElementById("app");
    const currentLabel = document.getElementById("currentLabel");
    const homeLink = document.getElementById("homeLink");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function routeBase() {
      return location.pathname.includes("/notes/") ? "../../" : "./";
    }

    function currentSlug() {
      const match = location.pathname.match(/\/notes\/([^/]+)\/?$/);
      if (match) return match[1];
      const legacyHash = location.hash.replace(/^#/, "");
      return legacyHash || "";
    }

    function onNotesPath() {
      return location.pathname.includes("/notes/");
    }

    function asset(path) {
      return routeBase() + path;
    }

    function renderMarkdown(markdown) {
      if (window.marked) {
        marked.use({ gfm: true, breaks: false });
        return marked.parse(markdown);
      }
      return `<pre><code>${escapeHtml(markdown)}</code></pre>`;
    }

    function enhanceArticleLinks() {
      app.querySelectorAll(".article a[href]").forEach(link => {
        const href = link.getAttribute("href");
        if (href && !href.startsWith("#")) {
          link.target = "_blank";
          link.rel = "noreferrer";
        }
      });
    }

    function noteHref(note) {
      return `${routeBase()}notes/${note.slug}/`;
    }

    function redirectLegacyHash() {
      if (onNotesPath() || !location.hash) return false;
      const legacySlug = location.hash.replace(/^#/, "");
      const legacyNote = notes.find(item => item.slug === legacySlug);
      if (!legacyNote) return false;
      location.replace(noteHref(legacyNote));
      return true;
    }

    function renderHome() {
      document.title = "AI Prompt Atlas";
      currentLabel.textContent = "全部笔记";
      homeLink.href = "./";
      app.innerHTML = `
        <section class="home-hero">
          <div class="home-kicker">Learning Snapshot · 2026-07-12</div>
          <h1>AI Prompt Atlas</h1>
          <p>模型提示词、Agent Runtime 与 Skills 学习图谱</p>
        </section>
        <section class="note-grid" aria-label="学习笔记列表">
          ${notes.map(note => `
            <a class="note-card" data-latest="${note.latest}" href="${noteHref(note)}">
              <div class="card-topline">
                <span class="family-tag">${escapeHtml(note.family)}</span>
                <span class="status-badge">${escapeHtml(note.badge)}</span>
              </div>
              <div class="card-copy">
                <h2>${escapeHtml(note.title)}</h2>
                <p>${escapeHtml(note.meta)}</p>
              </div>
              <div class="card-snapshot">${escapeHtml(note.snapshot)}</div>
            </a>
          `).join("")}
        </section>
      `;
    }

    async function renderNote(note) {
      document.title = `${note.title} | AI Prompt Atlas`;
      currentLabel.textContent = note.title;
      homeLink.href = routeBase();
      app.innerHTML = `
        <section class="note-page">
          <header class="note-title">
            <h1>${escapeHtml(note.heading)}</h1>
            <p>${escapeHtml(note.meta)}</p>
            <div class="snapshot-line">
              <span>${escapeHtml(note.family)}</span>
              <span class="dot" aria-hidden="true">•</span>
              <span>${escapeHtml(note.snapshot)}</span>
              <span class="status-badge">${escapeHtml(note.badge)}</span>
            </div>
          </header>
          <figure class="mindmap">
            <img src="${asset(note.image)}" alt="${escapeHtml(note.heading)} 学习图谱">
            <figcaption>学习图谱用于先建立整体结构，下面的 Markdown 负责展开细节。</figcaption>
          </figure>
          <article class="article">
            <div class="empty">正在加载 Markdown。</div>
          </article>
        </section>
      `;

      const article = app.querySelector(".article");
      try {
        const response = await fetch(asset(note.file), { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const markdown = await response.text();
        article.innerHTML = renderMarkdown(markdown);
        enhanceArticleLinks();
      } catch (error) {
        article.innerHTML = `<div class="empty">无法加载 ${escapeHtml(note.file)}。</div>`;
      }
    }

    function renderNotFound(slug) {
      document.title = "未找到笔记 | AI Prompt Atlas";
      currentLabel.textContent = "未找到笔记";
      homeLink.href = routeBase();
      app.innerHTML = `
        <section class="home-hero">
          <h1>没有找到这份学习笔记</h1>
          <p>当前路由：${escapeHtml(slug || "(empty)")}</p>
        </section>
        <section class="note-grid">
          ${notes.map(note => `
            <a class="note-card" data-latest="${note.latest}" href="${noteHref(note)}">
              <div class="card-topline">
                <span class="family-tag">${escapeHtml(note.family)}</span>
                <span class="status-badge">${escapeHtml(note.badge)}</span>
              </div>
              <div class="card-copy">
                <h2>${escapeHtml(note.title)}</h2>
                <p>${escapeHtml(note.meta)}</p>
              </div>
              <div class="card-snapshot">${escapeHtml(note.snapshot)}</div>
            </a>
          `).join("")}
        </section>
      `;
    }

    const slug = currentSlug();
    const note = notes.find(item => item.slug === slug);

    window.addEventListener("hashchange", redirectLegacyHash);

    if (redirectLegacyHash()) {
      // Navigation continues through location.replace.
    } else if (!slug) {
      renderHome();
    } else if (note) {
      renderNote(note);
    } else {
      renderNotFound(slug);
    }
  </script>
</body>
</html>
